<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Role — Step 2 — ExecBoard MX</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background-color: var(--grey-50); padding-bottom: var(--space-xxl); }
  </style>
</head>
<body>

  <header class="header">
    <div class="container" style="max-width: 100%; padding: 0 var(--space-xl);">
      <div class="header-inner">
        <a href="index.html" class="logo">ExecBoard MX</a>
        <a href="dashboard.html" class="btn btn-ghost btn-sm">← Back to Dashboard</a>
      </div>
    </div>
  </header>

  <main style="padding-top: var(--space-xxl);">
    <div class="container" style="max-width: 760px;">

      <div class="mb-xl">
        <h1 style="font-size: var(--font-size-3xl); margin-bottom: 4px;">Post a New Executive Role</h1>
        <p class="text-muted mb-0">Step 2 of 4 — Candidate Requirements</p>
      </div>

      <!-- Stepper -->
      <div class="stepper mb-xl">
        <div class="stepper-item completed"><div class="stepper-circle">✓</div><span>Details</span></div>
        <div class="stepper-line completed"></div>
        <div class="stepper-item active"><div class="stepper-circle">2</div><span>Requirements & Compensation</span></div>
        <div class="stepper-line"></div>
        <div id="step-pill-3" class="stepper-item"><div class="stepper-circle">3</div><span>Payment</span></div>
        <div class="stepper-line"></div>
        <div id="step-pill-4" class="stepper-item"><div class="stepper-circle">4</div><span>Finalize</span></div>
      </div>

          <div class="card mb-lg" style="padding: var(--space-xl);">
            <h3 style="margin-bottom: var(--space-xl);">Step 2: Candidate Requirements</h3>
            <!-- Existing fields ... -->
            <div class="form-group">
                <label class="form-label">Key Required Skills / Expertise</label>
                <input type="text" class="form-control" placeholder="e.g. P&L Management, FinTech Regs, Org Scaling">
            </div>

            <hr class="hr my-xl">
            <h3>Compensation & Package</h3>
            <div class="row mt-lg">
                <div class="col col-6">
                    <div class="form-group">
                        <label class="form-label">Min Salary (MXN)</label>
                        <input type="text" class="form-control" placeholder="2,000,000">
                    </div>
                </div>
                <div class="col col-6">
                    <div class="form-group">
                        <label class="form-label">Max Salary (MXN)</label>
                        <input type="text" class="form-control" placeholder="3,000,000">
                    </div>
                </div>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-lg">
            <a href="post-job.html" class="btn btn-secondary">← Back</a>
            <a href="post-job-step3.html" class="btn btn-primary btn-lg">Continue to Payment →</a>
          </div>

    </div>
  </main>

</body>
</html>
