<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile - ExecBoard MX</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="background-color: var(--color-surface);">

  <!-- Logged in Header Minimal -->
  <header class="header bg-white">
    <div class="container d-flex justify-content-between align-items-center">
       <a href="index.html" class="logo">ExecBoard MX</a>
       <span class="text-muted font-semibold">Editing Profile</span>
    </div>
  </header>

  <main class="py-xl">
    <div class="container" style="max-width: 800px;">
      
      <div class="d-flex justify-content-between align-items-center mb-xl">
        <h1>Edit Profile</h1>
        <a href="profile.html" class="btn btn-secondary">Cancel</a>
      </div>

      <div class="card p-xl mb-lg">
        <h2 class="mb-lg" style="font-size: 1.5rem; border-bottom: 1px solid var(--color-border); padding-bottom: var(--space-sm);">Basic Information</h2>
        
        <div class="row">
          <div class="col col-6 form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" value="Alejandra">
          </div>
          <div class="col col-6 form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" value="Vargas">
          </div>
        </div>

        <div class="form-group mt-md">
          <label class="form-label">Professional Headline</label>
          <input type="text" class="form-control" value="Chief Operating Officer / VP Operations" placeholder="e.g. Director of Engineering">
        </div>

        <div class="row mt-md">
          <div class="col col-6 form-group">
            <label class="form-label">Current Location</label>
            <input type="text" class="form-control" value="CDMX, Mexico">
          </div>
          <div class="col col-6 form-group">
            <label class="form-label">Job Status</label>
            <select class="form-control">
              <option selected>Open to Offers</option>
              <option>Actively Looking</option>
              <option>Not Looking</option>
            </select>
          </div>
        </div>

        <!-- Privacy Settings Info -->
        <div class="mt-lg p-md" style="background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius);">
          <div class="form-group mb-0 d-flex justify-content-between align-items-center">
             <div>
                <p class="font-semibold m-0">Anonymous Mode</p>
                <p class="text-muted m-0" style="font-size: 0.875rem;">Hide your name and photo from companies until you apply.</p>
             </div>
             <input type="checkbox" checked style="width: 20px; height: 20px;">
          </div>
        </div>
      </div>

      <div class="card p-xl mb-lg">
        <h2 class="mb-lg" style="font-size: 1.5rem; border-bottom: 1px solid var(--color-border); padding-bottom: var(--space-sm);">Executive Summary</h2>
        <div class="form-group mb-0">
          <label class="form-label">Bio Details</label>
          <textarea class="form-control" rows="5">15+ years of operational leadership experience scaling technology organizations across Mexico and LATAM from Series B through IPO. Specialized in building cross-functional organizations, optimizing unit economics, and leading international expansion. Passionate about operational excellence and data-driven decision making.</textarea>
        </div>
      </div>

      <div class="card p-xl mb-lg">
        <div class="d-flex justify-content-between align-items-center mb-lg border-bottom pb-sm">
          <h2 class="m-0" style="font-size: 1.5rem;">Professional Experience</h2>
          <button class="btn btn-secondary" style="padding: 4px 12px;">+ Add Role</button>
        </div>
        
        <!-- Editable Experience Block -->
        <div class="p-md mb-md" style="border: 1px solid var(--color-border-dark); border-radius: var(--radius);">
          <div class="form-group">
             <label class="form-label">Job Title</label>
             <input type="text" class="form-control" value="Chief Operating Officer">
          </div>
          <div class="row">
             <div class="col col-6 form-group">
               <label class="form-label">Company</label>
               <input type="text" class="form-control" value="AeroSystems MX">
             </div>
             <div class="col col-6 form-group">
               <label class="form-label">Dates</label>
               <input type="text" class="form-control" value="2021 - Present">
             </div>
          </div>
          <div class="form-group mb-0">
             <label class="form-label">Description</label>
             <textarea class="form-control" rows="3">Led global hardware manufacturing and supply chain logistics operations. Reduced supply chain latency by 20% while scaling production volume 3x across 4 international facilities in Mexico and Brazil.</textarea>
          </div>
        </div>

      </div>

      <div class="card p-xl mb-xl">
        <h2 class="mb-lg" style="font-size: 1.5rem; border-bottom: 1px solid var(--color-border); padding-bottom: var(--space-sm);">Resume / CV</h2>
        <div class="p-xl text-center" style="border: 2px dashed var(--color-border-dark); background-color: var(--color-surface); border-radius: var(--radius);">
           <p class="font-semibold text-main">A_Vargas_Executive_CV.pdf (2mb)</p>
           <div class="d-flex justify-content-center gap-md mt-md">
             <button class="btn btn-secondary">Upload New File</button>
             <button class="btn" style="color: var(--color-danger-text); border: 1px solid var(--color-danger-border);">Remove File</button>
           </div>
        </div>
      </div>

      <div class="text-right mb-xxl">
         <button class="btn btn-secondary mr-md">Cancel</button>
         <a href="profile.html" class="btn btn-primary px-xl">Save Changes</a>
      </div>

    </div>
  </main>

</body>
</html>
